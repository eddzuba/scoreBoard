<div class="scoreboard" cdkDropList  (cdkDropListDropped)="dropped($event)">
  <div  class="buttons">
     <div [ngClass]="rotateScore ? 'judge' : 'judgeBottom'" class="judge" (click)="roundClick($event)"></div>

    <app-gopro-status></app-gopro-status>
    <div class="settings-btn" (click)="toggleSettings(); onComboBoxClick($event)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.13,5.91,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.67,4.81,12c0,0.33,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
      </svg>
    </div>
  </div>
  <div class="allScore" (click)="whistle()">
      <div class="team" cdkDrag>


        <div id="score1" class="score"
             [ngClass]="setLeft && !(score1 + score2 == 0) ? 'setScore' : ''"
        >{{ rotateScore ? score1 : score2 }}</div>

      </div>
      <div class="button whistle net">
        <div class="current-time-display" *ngIf="(score1 === 0 && score2 === 0) || matchOver">
          {{ currentTime }}
        </div>
      </div>
      <div class="team" cdkDrag>


        <div id="score score2" class="score"
             [ngClass]="setLeft || (score1 + score2 == 0)? '' : 'setScore'"
        >{{ rotateScore ? score2 : score1  }}</div>

      </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" *ngIf="showSettings" (click)="toggleSettings()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h3>Настройки отправки счета</h3>
      <div class="input-group">
        <label for="url-input">URL для POST-запроса:</label>
        <input id="url-input" type="text" [(ngModel)]="notificationUrl" placeholder="https://scoreboard-proxy.eddzuba.workers.dev">
      </div>
      <div class="input-group">
        <label for="voice-select-modal">Голос озвучки:</label>
        <select id="voice-select-modal" [(ngModel)]="selectedVoice"
                (change)="onVoiceChange($event)" class="settings-select">
          <option *ngFor="let voice of voices" [value]="voice.path">{{ voice.name }}</option>
        </select>
      </div>
      <button class="close-btn" (click)="toggleSettings()">Закрыть</button>
    </div>
  </div>
</div>
